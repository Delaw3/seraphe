name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Deploy to DigitalOcean
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
          DROPLET_SSH_KEY: ${{ secrets.DROPLET_SSH_KEY }}
          DROPLET_PORT: ${{ secrets.DROPLET_PORT || '22' }}
        run: |
          test -n "$DROPLET_HOST"
          test -n "$DROPLET_USER"
          test -n "$DROPLET_SSH_KEY"

          mkdir -p ~/.ssh
          printf '%s\n' "$DROPLET_SSH_KEY" | perl -pe 's/\\n/\n/g' | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DROPLET_PORT" -H "$DROPLET_HOST" >> ~/.ssh/known_hosts
          ssh \
            -i ~/.ssh/deploy_key \
            -p "$DROPLET_PORT" \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            "$DROPLET_USER@$DROPLET_HOST" \
            'bash -lc "timeout 30m /var/www/seraphe/deploy.sh"'
